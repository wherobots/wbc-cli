name: Semantic Title Check

on:
  pull_request:

jobs:
  semantic-title-check:
    runs-on: depot-ubuntu-24.04-small
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            chore
            refactor
            perf
            test
            ci
            docs
            build
            style
            revert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
