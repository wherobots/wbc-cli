name: PR Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Test and Build
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...
